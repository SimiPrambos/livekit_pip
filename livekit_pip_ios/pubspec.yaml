name: livekit_pip_ios
description: iOS implementation of the livekit_pip plugin — AVSampleBufferDisplayLayer PiP pipeline for LiveKit WebRTC video tracks.
version: 0.1.0+1
homepage: https://github.com/SimiPrambos/livekit_pip
repository: https://github.com/SimiPrambos/livekit_pip/tree/main/livekit_pip_ios

environment:
  sdk: ^3.11.0
  flutter: ">=3.0.0"

flutter:
  plugin:
    implements: livekit_pip
    platforms:
      ios:
        pluginClass: LiveKitPipPlugin
        dartPluginClass: LivekitPipIOS

dependencies:
  flutter:
    sdk: flutter
  livekit_pip_platform_interface: ^0.1.0
  meta: ^1.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.5
  pigeon: ^27.1.0
  plugin_platform_interface: ^2.1.8
  very_good_analysis: ^10.2.0
