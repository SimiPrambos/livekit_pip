name: livekit_pip_example
description: Demonstrates how to use the livekit_pip plugin.
version: 0.1.0+1
publish_to: none

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  livekit_client: ^2.8.0
  permission_handler: ^12.0.0
  livekit_pip:
    # When depending on this package from a real application you should use:
    #   livekit_pip: ^x.y.z
    # See https://dart.dev/tools/pub/dependencies#version-constraints
    # The example app is bundled with the plugin so we use a path dependency on
    # the parent directory to use the current plugin's version.
    path: ../

dev_dependencies:
  flutter_driver:
    sdk: flutter
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true

# Several livekit_client transitive deps started using iOS 26 SDK APIs
# (NWPath.isUltraConstrained, NSProcessInfo.isiOSAppOnVision) which fail to
# compile on Xcode without the iOS 26 SDK. Pin to the last clean version that
# still satisfies livekit_client's semver constraints.
dependency_overrides:
  connectivity_plus: 7.0.0   # 7.1.0+ uses NWPath.isUltraConstrained (iOS 26)
  device_info_plus: 12.3.0   # 12.4.0 uses NSProcessInfo.isiOSAppOnVision (iOS 26)
