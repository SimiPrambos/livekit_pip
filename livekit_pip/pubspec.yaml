name: livekit_pip
description: Native Picture-in-Picture support for LiveKit video calls on Android and iOS.
version: 0.1.0+1
homepage: https://github.com/SimiPrambos/livekit_pip
repository: https://github.com/SimiPrambos/livekit_pip

environment:
  sdk: ^3.11.0

flutter:
  plugin:
    platforms:
      android:
        default_package: livekit_pip_android
      ios:
        default_package: livekit_pip_ios

dependencies:
  flutter:
    sdk: flutter
  livekit_client: ^2.8.0
  livekit_pip_android: ^0.1.0
  livekit_pip_ios: ^0.1.0
  livekit_pip_platform_interface: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.5
  plugin_platform_interface: ^2.1.8
  very_good_analysis: ^10.2.0
