name: livekit_pip_android
description: Android implementation of the livekit_pip plugin — native PiP using PictureInPictureParams with auto-enter on API 31+.
version: 0.2.0
homepage: https://github.com/SimiPrambos/livekit_pip
repository: https://github.com/SimiPrambos/livekit_pip/tree/main/livekit_pip_android

environment:
  sdk: ^3.11.0
  flutter: ">=3.0.0"

flutter:
  plugin:
    implements: livekit_pip
    platforms:
      android:
        package: dev.kaffah
        pluginClass: PipPlugin
        dartPluginClass: LivekitPipAndroid

dependencies:
  flutter:
    sdk: flutter
  livekit_pip_platform_interface: ^0.1.0
  meta: ^1.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.5
  pigeon: ^27.1.0
  plugin_platform_interface: ^2.1.8
  very_good_analysis: ^10.2.0
